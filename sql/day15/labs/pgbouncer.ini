; PgBouncer example for handbook lab (Day 15 stretch)
; Mount alongside postgres in docker-compose extension

[databases]
handbook = host=db port=5432 dbname=handbook

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 10
admin_users = handbook
