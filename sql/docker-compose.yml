services:
  db:
    image: postgres:16-alpine
    container_name: sql-handbook-db
    environment:
      POSTGRES_USER: handbook
      POSTGRES_PASSWORD: handbook
      POSTGRES_DB: handbook
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./labs/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handbook -d handbook"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
