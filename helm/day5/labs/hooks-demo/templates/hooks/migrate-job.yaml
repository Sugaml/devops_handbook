apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hooks-demo.fullname" . }}-migrate-{{ .Values.migrationTag | replace "." "-" }}
  labels:
    {{- include "hooks-demo.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        helm.sh/hook: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command:
            - sh
            - -c
            - echo "Running migration {{ .Values.migrationTag }}" && sleep 3
