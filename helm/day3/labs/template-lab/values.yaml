replicaCount: 2

image:
  repository: nginx
  tag: 1.27-alpine
  pullPolicy: IfNotPresent

service:
  port: 80
  type: ClusterIP

env:
  - name: APP_ENV
    value: handbook
  - name: LOG_LEVEL
    value: info

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: template-lab.local
      paths:
        - path: /
          pathType: Prefix

extraVolumes: []
# - name: cache
#   emptyDir: {}

podAnnotations: {}

resources: {}
