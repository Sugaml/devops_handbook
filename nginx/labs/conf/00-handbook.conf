# Handbook base config — included by main nginx image default

server {
    listen 8081;
    server_name localhost;
    root /usr/share/nginx/html/site-a;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 8082;
    server_name localhost;
    root /usr/share/nginx/html/site-b;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

upstream handbook_api {
    least_conn;
    server backend1:5678;
    server backend2:5678;
}

server {
    listen 8080;
    server_name localhost;

    location /api/ {
        proxy_pass http://handbook_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
