services:
  redis-node-1:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports: ["7000:6379"]
    volumes:
      - ./redis-cluster.conf:/etc/redis/redis.conf:ro

  redis-node-2:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports: ["7001:6379"]
    volumes:
      - ./redis-cluster.conf:/etc/redis/redis.conf:ro

  redis-node-3:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports: ["7002:6379"]
    volumes:
      - ./redis-cluster.conf:/etc/redis/redis.conf:ro
