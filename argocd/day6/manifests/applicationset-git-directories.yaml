apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/YOUR_ORG/gitops-handbook.git
        revision: main
        directories:
          - path: argocd/day6/labs/apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: handbook
      source:
        repoURL: https://github.com/YOUR_ORG/gitops-handbook.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: handbook-lab
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
