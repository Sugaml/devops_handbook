---
- name: Deploy multi-vhost nginx configuration
  hosts: webservers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate vhosts defined
      ansible.builtin.assert:
        that:
          - vhosts is defined
          - vhosts | length > 0
        fail_msg: "Define vhosts in group_vars/webservers.yml"

  tasks:
    - name: Create vhost document roots
      ansible.builtin.file:
        path: "{{ item.root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.name }}"
      when: ansible_os_family == "Debian"

    - name: Deploy index.html per vhost
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html><body><h1>{{ item.server_name }}</h1><p>Host: {{ inventory_hostname }}</p></body></html>
        dest: "{{ item.root }}/index.html"
        mode: "0644"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Deploy nginx vhost configs
      ansible.builtin.template:
        src: nginx-vhost.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.name }}"
      notify: Reload nginx

    - name: Enable vhost sites
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ item.name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
        state: link
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.name }}"
      when: ansible_os_family == "Debian"
      notify: Reload nginx

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
