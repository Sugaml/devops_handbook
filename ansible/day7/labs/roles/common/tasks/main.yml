---
- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Set timezone to UTC
  ansible.builtin.command: timedatectl set-timezone UTC
  changed_when: false
  when: ansible_os_family == "Debian"
