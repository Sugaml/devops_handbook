services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "9080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - public
    depends_on:
      - backend

  backend:
    image: nginx:1.27-alpine
    volumes:
      - ./backend/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - backend
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
    networks:
      - backend

networks:
  public:
  backend:
    internal: true
