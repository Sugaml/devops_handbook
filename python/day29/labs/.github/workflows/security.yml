name: python-security
on:
  pull_request:
    paths:
      - "python/day29/**"
  push:
    branches: [main]
    paths:
      - "python/day29/**"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scanners
        run: pip install bandit pip-audit
      - name: bandit SAST
        run: bandit -r python/day29/labs -ll -c python/day29/labs/pyproject.toml
      - name: pip-audit dependencies
        run: pip-audit -r python/day29/labs/requirements.txt
      - name: Local secret pattern scan
        run: python python/day29/labs/scan_secrets.py python/day29/labs
