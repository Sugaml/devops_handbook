global:
  resolve_timeout: 5m

route:
  receiver: handbook-log
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: handbook-log
    webhook_configs:
      - url: http://127.0.0.1:65535/
        send_resolved: true
        # Lab: Alertmanager logs delivery errors; configure Slack/PagerDuty in production

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, instance]
